<!DOCTYPE html>
<html>
<head>
<title>My Games Site</title>
<style>
body {
background: #111;
color: white;
text-align: center;
font-family: Arial;
}
button {
padding: 15px;
margin: 10px;
font-size: 18px;
cursor: pointer;
}
</style>
</head>
<body>

<h1>🎮 My Games Website</h1>

<button onclick="playGame()">Play Clicker Game</button>

<p id="score">Score: 0</p>

<script>
let score = 0;
function playGame() {
score++;
document.getElementById("score").innerText = "Score: " + score;
}
</script>

</body>
</html>
<!DOCTYPE html>

h1 {

.game-button {

text-decoration: none;

.game-button:hover {

}

footer {
margin-top: 50px;
font-size: 12px;
color: #888;
}
